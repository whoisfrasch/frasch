name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: |
          jekyll_bin="$(bundle exec ruby -e "print Gem.bin_path('jekyll','jekyll')")"
          bundle exec ruby "$jekyll_bin" build --strict_front_matter
        env:
          JEKYLL_ENV: production
