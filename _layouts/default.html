<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {%- include head.html -%}
</head>
<body>
  <a class="skip-link" href="#main">skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="brand">
        <span class="brand-mark">&gt;_</span>
        <span class="brand-name">{{ site.title }}</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>notes</a>
        <a href="{{ '/art-of-ai/' | relative_url }}"{% if page.url contains '/art-of-ai/' %} aria-current="page"{% endif %}>the art of ai</a>
        <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>about</a>
        <button class="search-btn" id="search-open" aria-label="Search" title="Search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
          <span class="search-kbd" id="search-kbd">⌘K</span>
        </button>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          <span class="theme-icon-dark">●</span>
          <span class="theme-icon-light">○</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© {{ site.time | date: '%Y' }} {{ site.author }}</span>
      <span class="footer-links">
        <a href="https://github.com/{{ site.github_username }}">github</a>
        <a href="{{ '/archive/' | relative_url }}">archive</a>
        <a href="{{ '/tags/' | relative_url }}">tags</a>
        <a href="{{ '/feed.xml' | relative_url }}">rss</a>
      </span>
    </div>
  </footer>

  <dialog class="search-dialog" id="search-dialog" data-index="{{ '/search.json' | relative_url }}" aria-label="Site search">
    <div class="search-input-row">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input class="search-input" id="search-input" type="search" placeholder="search notes &amp; guides…" autocomplete="off" spellcheck="false" aria-label="Search query">
      <span class="search-esc">esc</span>
    </div>
    <ul class="search-results" id="search-results"></ul>
    <div class="search-hint-row">
      <span>↑↓ navigate</span>
      <span>↵ open</span>
      <span>esc close</span>
    </div>
  </dialog>

  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/enhance.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
</body>
</html>
