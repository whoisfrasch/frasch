title: frasch
tagline: Security Research & AI-Assisted Offensive Security
description: >-
  Notes, write-ups and research on web security, vulnerability hunting,
  and bug bounty work.
url: "https://frasch.github.io"
author: frasch
lang: en
locale: en_US

# We ship our own layouts and CSS — no Jekyll theme.
# (Leaving this unset lets the github-pages gem inject jekyll-theme-primer,
# whose Sass fails to compile under a non-UTF-8 build locale.)
theme: null

# Include posts dated in the future relative to build time
future: true

# URLs
permalink: /blog/:year/:title/

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter_opts:
    css_class: 'highlight'

# Plugins available on GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO defaults
twitter:
  card: summary_large_image
social:
  name: frasch
  links:
    - https://github.com/frasch

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - .gitignore
  - vendor

# Default front-matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
